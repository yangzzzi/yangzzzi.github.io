<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }
        
        /* 头部/头像区域 */
        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #fff;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        header p {
            font-size: 14px;
            opacity: 0.8;
        }

        /* 主体内容区域 */
        main {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card h2 {
            font-size: 18px;
            color: #1e3c72;
            margin-bottom: 12px;
            border-left: 4px solid #1e3c72;
            padding-left: 8px;
        }
        .card p {
            font-size: 15px;
            color: #555;
        }

        /* 互动按钮 */
        .btn-box {
            text-align: center;
            margin-top: 10px;
        }
        .interactive-btn {
            background-color: #1e3c72;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        .interactive-btn:hover {
            background-color: #2a5298;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <header>
        <div class="avatar">🚀</div>
        <h1>欢迎来到杨子的空间</h1>
        <p>探索科技 / 热爱生活 / 持续 热爱</p>
    </header>

    <main>
        <div class="card">
            <h2>关于我</h2>
            <p>你好！yangzi这是一个完全在安卓手机上运行的网页示例。我喜欢探索新鲜的技术，利用数字工具来提升效率和创造精彩内容。</p>
        </div>

        <div class="card">
            <h2>兴趣爱好</h2>
            <p>💻 探索前沿的网络技术与数字工具</p>
            <p>🚗 钻研汽车机械结构与日常维护</p>
            <p>📈 观察数据趋势与逻辑分析</p>
        </div>

        <div class="btn-box">
            <button class="interactive-btn" id="helloBtn">点我打个招呼</button>
        </div>
    </main>

    <footer>
        <p>© 2026 我的个人主页. Built on Android.</p>
    </footer>

    <script>
        document.getElementById('helloBtn').addEventListener('click', function() {
            alert('🎉 嗨！恭喜你，你的第一个手机制作的网页互动成功了！');
        });
    </script>
</body>
</html>
